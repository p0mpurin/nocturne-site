<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nocturne — 3DS hShop Client</title>
  <meta name="description" content="Nocturne is a dark, fast 3DS homebrew client for hShop.">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/p0mpurin/just-an-hshop-fork/main/universal-updater/icons/0.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-glow"></div>
    <div class="container">
      <img class="hero-icon" src="https://raw.githubusercontent.com/p0mpurin/just-an-hshop-fork/main/universal-updater/icons/0.png" alt="Nocturne icon" width="64" height="64">
      <h1>Nocturne</h1>
      <p class="hero-sub">A faster, darker hShop client for the Nintendo 3DS.</p>
      <a href="https://hshop.erista.me/3hs" class="btn btn-primary">Download</a>
    </div>
  </header>

  <!-- QR Codes -->
  <section class="qrs">
    <div class="container">
      <div class="qr-grid">
        <div class="qr-card">
          <h2>Install with FBI</h2>
          <p>Open FBI → Remote Install → Scan QR Code</p>
          <img src="https://raw.githubusercontent.com/p0mpurin/just-an-hshop-fork/main/assets/nocturne-fbi-qr.png" alt="FBI QR code" class="qr-img" width="350" height="350">
        </div>
        <div class="qr-card">
          <h2>Universal-Updater</h2>
          <p>Add UniStore to get updates on your 3DS</p>
          <img src="https://raw.githubusercontent.com/p0mpurin/just-an-hshop-fork/main/assets/nocturne-unistore-qr.png" alt="UniStore QR code" class="qr-img" width="350" height="350">
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p class="footer-credits">
        Nocturne by <a href="https://github.com/p0mpurin">p0mpurin</a>.
        Based on <a href="https://github.com/hShop">3hs by the hShop team</a>.
      </p>
      <p class="footer-license">
        <img src="https://img.shields.io/badge/license-GPLv3-blue" alt="GPLv3">
      </p>
      <p class="footer-notice">Not affiliated with or endorsed by the hShop team.</p>
    </div>
  </footer>

</body>
</html>
